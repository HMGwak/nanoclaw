name = "doc_explorer"
description = "문서 배치를 읽고 구조화된 claim을 추출하는 탐색 에이전트"
model = "gpt-5.4"
model_reasoning_effort = "medium"
sandbox_mode = "read-only"
developer_instructions = """
주어진 문서 경로 목록을 cat으로 읽고, 각 문서에서 다음을 추출하라:
- claim: 핵심 사실/절차/이슈
- quote: 원문 근거 (1-2문장)
- doc_id: 파일명
- section_target: wiki 섹션 힌트
- confidence: high/medium/low

JSON 배열로 report_agent_job_result를 통해 보고하라.
"""
